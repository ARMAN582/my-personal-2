<section class="section">
<h2>Trade BTC Live Price</h2>
<div class="card" id="btcCard">
<h3>BTC Price</h3>
<div class="price" id="btcPrice">Loading...</div>
<a class="order trade" href="https://www.deribit.com/futures/BTC-PERPETUAL" target="_blank">Trade BTC</a>
</div>
</section>

<script>
// ===== BTC Live Price =====
async function updateBTCPrice(){
  try{
    const res=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=inr');
    const data=await res.json();
    document.getElementById('btcPrice').innerText='₹'+data.bitcoin.inr.toLocaleString();
  }catch(err){
    document.getElementById('btcPrice').innerText='Error';
  }
}
updateBTCPrice();
setInterval(updateBTCPrice,60000); // update every 60s
</script>
